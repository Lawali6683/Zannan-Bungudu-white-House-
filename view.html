<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    background:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Container */
.image-box{
    position:relative;
    width:90%;
    max-width:400px;
    border-radius:12px;
    padding:3px;
    overflow:hidden;
}

/* Animated border */
.image-box::before{
    content:"";
    position:absolute;
    inset:-2px;
    background:linear-gradient(
        120deg,
        #ffae00,
        #ff6600,
        #ffae00,
        #ffd700,
        #ff6600
    );
    background-size:300% 300%;
    animation:moveBorder 4s linear infinite;
    z-index:0;
    filter:blur(8px);
}

/* Inner white space */
.image-box::after{
    content:"";
    position:absolute;
    inset:2px;
    background:#fff;
    border-radius:10px;
    z-index:1;
}

/* Image */
.image-box img{
    position:relative;
    width:100%;
    border-radius:10px;
    z-index:2;
}

/* Animation */
@keyframes moveBorder{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
</style>
</head>

<body>

<div class="image-box">
    <img src="https://i.imgur.com/xALIxvL.jpeg">
</div>

</body>
</html>
